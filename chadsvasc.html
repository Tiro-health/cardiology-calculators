    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Lexend", sans-serif;
        min-height: 100vh;
        background: #f0f4f3;
        color: #1a2e2a;
        padding: 2.5rem 2rem;
      }

      /* ---- Header ---- */
      .page-header {
        max-width: 1100px;
        margin: 0 auto 2.5rem;
        display: flex;
        align-items: baseline;
        gap: 1rem;
      }

      .page-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: #0d3b30;
      }

      .page-header p {
        font-size: 0.82rem;
        color: #7a9990;
        font-weight: 400;
      }

      /* ---- Grid ---- */
      .grid {
        display: grid;
        grid-template-columns: 400px 1fr;
        gap: 1.5rem;
        max-width: 1100px;
        margin: 0 auto;
        align-items: start;
      }

      /* ---- Cards ---- */
      .card {
        background: #ffffff;
        border-radius: 0.75rem;
        padding: 1.75rem;
        border: 1px solid #dce8e4;
      }

      .card__title {
        font-size: 0.7rem;
        font-weight: 600;
        color: #7a9990;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 1rem;
      }

      /* ---- Autofill button ---- */
      tiro-magic-clipboard button[type="submit"] {
        display: block;
        width: 100%;
        margin-top: 1rem;
        padding: 0.65rem 1.25rem;
        font-family: "Lexend", sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        color: #fff;
        background: #0d3b30;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
      }

      tiro-magic-clipboard button[type="submit"]:hover {
        background: #155c4a;
      }

      tiro-magic-clipboard button[type="submit"]:active {
        transform: scale(0.98);
      }

      /* ---- Footer ---- */
      footer {
        max-width: 1100px;
        margin: 2rem auto 0;
        text-align: center;
        font-size: 0.68rem;
        color: #a3b8b1;
      }

      footer a {
        color: #7a9990;
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }

      /* ---- Responsive ---- */
      @media (max-width: 860px) {
        .page-header {
          flex-direction: column;
          gap: 0.25rem;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
