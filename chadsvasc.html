      * {

        min-height: 100vh;
        background: #F8FAFC;
        color: #0F172A;
        padding: 0;
      }

      /* ---- EHR Header ---- */
      .ehr-header {
        position: sticky;
        top: 0;
        height: 56px;
        background: #ffffff;
        border-bottom: 1px solid #E2E8F0;
        display: flex;
        align-items: center;
        padding: 0 2rem;
        z-index: 100;
      }

      .ehr-header__brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .ehr-header__logo {
        width: 32px;
        height: 32px;
        background: #2563EB;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .ehr-header__titles {
        display: flex;
        flex-direction: column;
      }

      .ehr-header__app-name {
        font-size: 0.9375rem;
        font-weight: 700;
        color: #0F172A;
        line-height: 1.2;
      }

      .ehr-header__subtitle {
        font-size: 0.6875rem;
        color: #64748B;
        line-height: 1.2;
      }

      /* ---- Content wrapper ---- */
      .ehr-content {
        padding: 2.5rem 2rem;
      }

      /* ---- Grid ---- */
      .grid {
        display: grid;
        grid-template-columns: 400px 1fr;
        gap: 1.5rem;
        max-width: 1100px;
        margin: 0 auto;
        align-items: start;
      }

      /* ---- Cards ---- */
      .card {
        background: #ffffff;
        border-radius: 0.5rem;
        padding: 1.25rem;
        border: 1px solid #E2E8F0;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .card__title {
        font-size: 0.7rem;
        font-weight: 600;
        color: #94A3B8;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 1rem;
      }

      /* ---- Autofill button ---- */
      tiro-magic-clipboard-button {
        display: block;
        width: 100%;
        margin-top: 1rem;
        padding: 0.65rem 1.25rem;
        font-family: "Inter", sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        color: #fff;
        background: #2563EB;
        border: none;
        border-radius: 0.375rem;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        text-align: center;
      }

      tiro-magic-clipboard-button:hover {
        background: #1D4ED8;
      }

      tiro-magic-clipboard-button:active {
        transform: scale(0.98);
      }

      tiro-magic-clipboard-button[data-state="pending"] {
        background: #1E40AF;
        cursor: wait;
        opacity: 0.85;
      }

      tiro-magic-clipboard-button[data-state="pending"]::before {
        content: "";
        display: inline-block;
        width: 0.85em;
        height: 0.85em;
        margin-right: 0.5em;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        vertical-align: -0.1em;
        animation: mc-spin 0.6s linear infinite;
      }

      @keyframes mc-spin {
        to { transform: rotate(360deg); }
      }

      tiro-magic-clipboard-button[data-state="success"] {
        background: #16A34A;
        cursor: default;
      }

      tiro-magic-clipboard-button[data-state="success"]::before {
        content: "\2713";
        margin-right: 0.4em;
      }

      tiro-magic-clipboard-button[data-state="error"] {
        background: #DC2626;
        cursor: default;
      }

      /* ---- Footer ---- */
      footer {
        max-width: 1100px;
        margin: 2rem auto 0;
        text-align: center;
        font-size: 0.68rem;
        color: #94A3B8;
      }

      footer a {
        color: #64748B;
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }

      /* ---- Responsive ---- */
      @media (max-width: 860px) {
        .ehr-content {
          padding: 1.25rem 1rem;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
