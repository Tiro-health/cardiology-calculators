<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator - Tiro Web SDK</title>
    <!-- Google Fonts (required for Tiro Web SDK) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend:wght@100..900&family=Fira+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        background: #F8FAFC;
        color: #0F172A;
        padding: 0;
      }

      /* ---- EHR Header ---- */
      .ehr-header {
        position: sticky;
        top: 0;
        height: 56px;
        background: #ffffff;
        border-bottom: 1px solid #E2E8F0;
        display: flex;
        align-items: center;
        padding: 0 2rem;
        z-index: 100;
      }

      .ehr-header__brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .ehr-header__logo {
        width: 32px;
        height: 32px;
        background: #2563EB;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .ehr-header__titles {
        display: flex;
        flex-direction: column;
      }

      .ehr-header__app-name {
        font-size: 0.9375rem;
        font-weight: 700;
        color: #0F172A;
        line-height: 1.2;
      }

      .ehr-header__subtitle {
        font-size: 0.6875rem;
        color: #64748B;
        line-height: 1.2;
      }

      /* ---- Content wrapper ---- */
      .ehr-content {
        padding: 2.5rem 2rem;
      }

      /* ---- Grid ---- */
      .grid {
        display: grid;
        grid-template-columns: 400px 1fr;
        gap: 1.5rem;
        max-width: 1100px;
        margin: 0 auto;
        align-items: start;
      }

      /* ---- Cards ---- */
      .card {
        background: #ffffff;
        border-radius: 0.5rem;
        padding: 1.25rem;
        border: 1px solid #E2E8F0;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .card__title {
        font-size: 0.7rem;
        font-weight: 600;
        color: #94A3B8;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 1rem;
      }

      /* ---- Autofill button ---- */
      tiro-magic-clipboard button[type="submit"] {
        display: block;
        width: 100%;
        margin-top: 1rem;
        padding: 0.65rem 1.25rem;
        font-family: "Inter", sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        color: #fff;
        background: #2563EB;
        border: none;
        border-radius: 0.375rem;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
      }

      tiro-magic-clipboard button[type="submit"]:hover {
        background: #1D4ED8;
      }

      tiro-magic-clipboard button[type="submit"]:active {
        transform: scale(0.98);
      }

      /* ---- BMI result ---- */
      .bmi-result {
        margin-top: 1.25rem;
        background: #F8FAFC;
        border: 1px solid #E2E8F0;
        border-radius: 0.5rem;
        padding: 1rem 1.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        opacity: 0;
        transform: translateY(4px);
        transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .bmi-result.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .bmi-result__label {
        font-size: 0.7rem;
        font-weight: 600;
        color: #64748B;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .bmi-result__value {
        font-family: "Fira Mono", monospace;
        font-size: 1.75rem;
        font-weight: 700;
        color: #0F172A;
        line-height: 1;
      }

      .bmi-result__category {
        font-size: 0.7rem;
        font-weight: 600;
        margin-top: 0.2rem;
        padding: 0.1rem 0.45rem;
        border-radius: 999px;
        display: inline-block;
      }

      .bmi-result__category.underweight {
        background: #EFF6FF;
        color: #1D4ED8;
      }
      .bmi-result__category.normal {
        background: #F0FDF4;
        color: #15803D;
      }
      .bmi-result__category.overweight {
        background: #FFFBEB;
        color: #B45309;
      }
      .bmi-result__category.obese {
        background: #FEF2F2;
        color: #B91C1C;
      }

      .bmi-result__right {
        text-align: right;
      }

      /* ---- Footer ---- */
      footer {
        max-width: 1100px;
        margin: 2rem auto 0;
        text-align: center;
        font-size: 0.68rem;
        color: #94A3B8;
      }

      footer a {
        color: #64748B;
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }

      /* ---- Responsive ---- */
      @media (max-width: 860px) {
        .ehr-content {
          padding: 1.25rem 1rem;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script>
      !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]),t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.async=!0,p.src=s.api_host.replace(".i.posthog.com","-assets.i.posthog.com")+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(void 0!==a?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return"posthog"!==a&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+".people (stub)"},o="init capture register register_once register_for_session unregister opt_out_capturing has_opted_out_capturing opt_in_capturing reset isFeatureEnabled getFeatureFlag getFeatureFlagPayload reloadFeatureFlags group identify setPersonProperties setPersonPropertiesForFlags resetPersonPropertiesForFlags setGroupPropertiesForFlags resetGroupPropertiesForFlags resetGroups onFeatureFlags addFeatureFlagsHandler onSessionId getSurveys getActiveMatchingSurveys renderSurvey canRenderSurvey getNextSurveyStep".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||[]);

  </head>
  <body>
    <header class="ehr-header">
      <div class="ehr-header__brand">
        <div class="ehr-header__logo">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <text x="4" y="14" font-family="Inter,sans-serif" font-weight="700" font-size="14" fill="#fff">T</text>
          </svg>
        </div>
        <div class="ehr-header__titles">
          <span class="ehr-header__app-name">BMI Calculator</span>
          <span class="ehr-header__subtitle">Body Mass Index based on weight and height</span>
        </div>
      </div>
    </header>

    <div class="ehr-content">
    <div class="grid">
      <!-- Left column: Magic Clipboard -->
      <div class="card">
        <div class="card__title">Magic Clipboard</div>
        <tiro-magic-clipboard for="bmi-form">
          <button type="submit">Autofill form</button>
        </tiro-magic-clipboard>
      </div>

      <!-- Right column: BMI Form -->
      <div class="card">
        <div class="card__title">Calculator</div>
        <tiro-form-filler id="bmi-form">
          <script type="application/fhir+json" slot="questionnaire">
            {
              "resourceType": "Questionnaire",
              "status": "active",
              "title": "BMI Calculator",
              "language": "en",
              "item": [
                {
                  "linkId": "weight",
                  "type": "decimal",
                  "text": "Weight",
                  "required": true,
                  "extension": [
                    {
                      "url": "http://hl7.org/fhir/StructureDefinition/questionnaire-itemControl",
                      "valueCodeableConcept": {
                        "text": "textfield",
                        "coding": [
                          {
                            "system": "http://fhir.tiro.health/CodeSystem/tiro-questionnaire-item-control",
                            "code": "textfield"
                          }
                        ]
                      }
                    },
                    {
                      "url": "http://hl7.org/fhir/StructureDefinition/questionnaire-unit",
                      "valueCoding": {
                        "system": "http://unitsofmeasure.org",
                        "code": "kg",
                        "display": "kg"
                      }
                    },
                    {
                      "url": "http://hl7.org/fhir/StructureDefinition/entryFormat",
                      "valueString": "e.g. 72"
                    }
                  ]
                },
                {
                  "linkId": "height",
                  "type": "decimal",
                  "text": "Height",
                  "required": true,
                  "extension": [
                    {
                      "url": "http://hl7.org/fhir/StructureDefinition/questionnaire-itemControl",
                      "valueCodeableConcept": {
                        "text": "textfield",
                        "coding": [
                          {
                            "system": "http://fhir.tiro.health/CodeSystem/tiro-questionnaire-item-control",
                            "code": "textfield"
                          }
                        ]
                      }
                    },
                    {
                      "url": "http://hl7.org/fhir/StructureDefinition/questionnaire-unit",
                      "valueCoding": {
                        "system": "http://unitsofmeasure.org",
                        "code": "cm",
                        "display": "cm"
                      }
                    },
                    {
                      "url": "http://hl7.org/fhir/StructureDefinition/entryFormat",
                      "valueString": "e.g. 175"
                    }
                  ]
                },
                {
                  "linkId": "bmi",
                  "type": "decimal",
                  "text": "BMI",
                  "readOnly": true,
                  "extension": [
                    {
                      "url": "http://hl7.org/fhir/StructureDefinition/questionnaire-itemControl",
                      "valueCodeableConcept": {
                        "text": "textfield",
                        "coding": [
                          {
                            "system": "http://fhir.tiro.health/CodeSystem/tiro-questionnaire-item-control",
                            "code": "textfield"
                          }
                        ]
                      }
                    },
                    {
                      "url": "http://hl7.org/fhir/StructureDefinition/questionnaire-unit",
                      "valueCoding": {
                        "system": "http://unitsofmeasure.org",
                        "code": "kg/m2",
                        "display": "kg/m2"
                      }
                    },
                    {
                      "url": "http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-calculatedExpression",
                      "valueExpression": {
                        "language": "text/fhirpath",
                        "expression": "iif(%resource.item.where(linkId='weight').answer.value.exists() and %resource.item.where(linkId='height').answer.value.exists() and %resource.item.where(linkId='height').answer.value > 0, (%resource.item.where(linkId='weight').answer.value / (%resource.item.where(linkId='height').answer.value * 0.01).power(2)).round(1), {})"
                      }
                    }
                  ]
                }
              ]
            }
          </script>
        </tiro-form-filler>

        <div class="bmi-result" id="bmi-result">
          <div>
            <div class="bmi-result__label">Your BMI</div>
          </div>
          <div class="bmi-result__right">
            <div class="bmi-result__value" id="bmi-value">--</div>
            <div class="bmi-result__category" id="bmi-category"></div>
          </div>
        </div>
      </div>
    </div>

    <footer>
      Powered by <a href="https://sdk.tiro.health/web">Tiro Web SDK</a>
    </footer>
    </div><!-- /.ehr-content -->

    <script src="https://cdn.tiro.health/sdk/latest/tiro-web-sdk.iife.js"></script>

    <script>
      const form = document.getElementById("bmi-form");
      const resultBanner = document.getElementById("bmi-result");
      const bmiValueEl = document.getElementById("bmi-value");
      const bmiCategoryEl = document.getElementById("bmi-category");

      function classifyBmi(bmi) {
        if (bmi < 18.5) return { label: "Underweight", cls: "underweight" };
        if (bmi < 25) return { label: "Normal", cls: "normal" };
        if (bmi < 30) return { label: "Overweight", cls: "overweight" };
        return { label: "Obese", cls: "obese" };
      }

      function extractBmi(response) {
        const bmiItem = response?.item?.find((i) => i.linkId === "bmi");
        return bmiItem?.answer?.[0]?.valueDecimal ?? null;
      }

      function updateResult(response) {
        const bmi = extractBmi(response);
        if (bmi != null && bmi > 0) {
          const { label, cls } = classifyBmi(bmi);
          bmiValueEl.textContent = bmi.toFixed(1);
          bmiCategoryEl.textContent = label;
          bmiCategoryEl.className = "bmi-result__category " + cls;
          resultBanner.classList.add("visible");
        } else {
          resultBanner.classList.remove("visible");
        }
      }

      form.addEventListener("tiro-update", (e) => {
        updateResult(e.detail.response);
      });
    </script>
  </body>
</html>
